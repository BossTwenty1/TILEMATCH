name: 🚀 TileMatch Automated Testing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-automated-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: 'tilematch_db'
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: 📥 Checkout repository code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: 🗄️ Initialize MySQL Schema & Seed Data
        run: |
          mysql -h 127.0.0.1 -u root --port 3306 tilematch_db < database/tilematch_schema.sql
          mysql -h 127.0.0.1 -u root --port 3306 tilematch_db < database/tilematch_seed.sql

      - name: ⚙️ Install Backend Server Dependencies
        run: |
          cd server
          npm ci

      - name: ⚙️ Install Testing Environment Dependencies
        run: |
          cd testing
          npm install

      - name: 🌐 Install Playwright Chromium Browser
        run: |
          cd testing
          npx playwright install chromium --with-deps

      - name: 🚀 Start Server & Execute Automated Tests Suite
        run: |
          cd server
          npm start &
          # Wait for API server to be responsive
          npx wait-on http://localhost:5000/api/health --timeout 20000
          
          cd ../testing
          # Execute Jest API integration tests and Playwright E2E browser tests
          npm run test
        env:
          PORT: 5000
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ''
          DB_NAME: tilematch_db
          JWT_SECRET: pipeline_super_secret_testing_key
